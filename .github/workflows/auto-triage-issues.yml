name: Auto triage issues

on:
  issues:
    types: [opened, edited, reopened, transferred]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  triage:
    name: Label issues and sync project fields
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'issues' ||
      github.event.issue.author_association == 'OWNER' ||
      github.event.issue.author_association == 'MEMBER' ||
      github.event.issue.author_association == 'COLLABORATOR'
    steps:
      - name: Triage issues and sync linked project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN != '' && secrets.PROJECTS_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const projectOwner = process.env.PROJECT_OWNER || owner;
            const projectOwnerType = (process.env.PROJECT_OWNER_TYPE || context.payload.repository?.owner?.type || 'User').toLowerCase();
            const configuredProjectNumber = process.env.PROJECT_NUMBER || '';
            const trustedAuthorAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);

            const log = {
              project: null,
              processed: [],
              skippedIssues: [],
              labelsAdded: [],
              fieldsUpdated: [],
              fieldsPreserved: [],
              skippedFields: [],
              projectMismatches: []
            };

            const normalize = (value) => String(value || '').trim().toLowerCase();
            const includesAny = (text, words) => words.some((word) => normalize(text).includes(normalize(word)));
            const issueText = (issue) => `${issue.title || ''}\n${issue.body || ''}`;
            const hasTrustedAuthorAssociation = (item) => trustedAuthorAssociations.has(String(item.author_association || '').toUpperCase());

            const projectFieldSelection = `
              ... on ProjectV2Field { id name dataType }
              ... on ProjectV2SingleSelectField { id name dataType options { id name } }
              ... on ProjectV2IterationField { id name dataType }
            `;

            const projectSelection = `
              id
              number
              title
              fields(first: 100) {
                nodes {
                  __typename
                  ${projectFieldSelection}
                }
              }
              items(first: 100) {
                nodes {
                  content {
                    __typename
                    ... on Issue { repository { nameWithOwner } }
                    ... on PullRequest { repository { nameWithOwner } }
                    ... on DraftIssue { title }
                  }
                }
              }
            `;

            async function getExistingLabels() {
              const labels = await github.paginate(github.rest.issues.listLabelsForRepo, { owner, repo, per_page: 100 });
              return new Map(labels.map((label) => [normalize(label.name), label.name]));
            }

            function existingLabel(existingLabels, candidates) {
              for (const candidate of candidates) {
                const match = existingLabels.get(normalize(candidate));
                if (match) return match;
              }
              return null;
            }

            function chooseLabels(issue, existingLabels) {
              const text = issueText(issue);
              const chosen = new Set();
              const triage = existingLabel(existingLabels, ['needs-triage', 'triage']);
              if (triage) chosen.add(triage);

              const typeRules = [
                [['bug', 'broken', 'error', 'exception', 'crash', 'failed', 'failing', 'regression', 'does not work'], ['bug', 'type:bug', 'kind:bug']],
                [['feature', 'enhancement', 'add support', 'new block', 'new capability', 'improve'], ['enhancement', 'feature', 'type:feature', 'type:enhancement']],
                [['question', 'how do i', 'how should', 'clarify'], ['question', 'type:question']]
              ];
              for (const [keywords, labels] of typeRules) {
                if (includesAny(text, keywords)) {
                  const label = existingLabel(existingLabels, labels);
                  if (label) chosen.add(label);
                  break;
                }
              }

              const areaRules = [
                [['readme', 'docs', 'documentation', 'architecture', 'challenge'], ['documentation', 'docs', 'area:docs']],
                [['blazor', 'server app', 'operator ui', 'frontend', 'backend'], ['app', 'area:app']],
                [['compiler', 'python', 'opcode', 'workspace json'], ['compiler', 'area:compiler']],
                [['firmware', 'arduino', 'c++', 'controller'], ['firmware', 'area:firmware']],
                [['blockly', 'block', 'visual programming'], ['blockly', 'area:blockly']],
                [['bluetooth', 'wifi', 'wi-fi', 'mqtt', 'protocol'], ['communication', 'area:communication']]
              ];
              for (const [keywords, labels] of areaRules) {
                if (includesAny(text, keywords)) {
                  const label = existingLabel(existingLabels, labels);
                  if (label) chosen.add(label);
                  break;
                }
              }

              return [...chosen].filter((label) => !issue.labels.some((current) => normalize(current.name) === normalize(label)));
            }

            function estimateIssue(issue) {
              const text = normalize(issueText(issue));
              const explicit = text.match(/(?:estimate|points?)\s*[:=]\s*(\d+(?:\.\d+)?)/);
              if (explicit) return Number(explicit[1]);
              if (includesAny(text, ['typo', 'copy', 'readme', 'minor docs', 'small docs'])) return 1;
              if (includesAny(text, ['documentation', 'docs', 'cleanup', 'rename', 'small refactor'])) return 2;
              if (includesAny(text, ['architecture', 'bluetooth', 'mqtt', 'firmware', 'compiler', 'simulation', 'integration'])) return 5;
              if (includesAny(text, ['major', 'large', 'epic', 'full system', 'end-to-end'])) return 8;
              return 3;
            }

            function priorityForIssue(issue) {
              const text = issueText(issue);
              if (includesAny(text, ['blocker', 'critical', 'urgent', 'security', 'safety', 'cannot run', 'crash', 'demo blocked', 'competition blocked'])) return 'high';
              if (includesAny(text, ['typo', 'nice to have', 'cleanup', 'polish', 'low priority'])) return 'low';
              return 'medium';
            }

            function sizeForEstimate(points) {
              if (points <= 1) return 'xs';
              if (points <= 2) return 's';
              if (points <= 3) return 'm';
              if (points <= 5) return 'l';
              return 'xl';
            }

            const findField = (project, names) => project.fields.nodes.find((field) => names.map(normalize).includes(normalize(field.name)));

            function optionByPreference(field, preferences) {
              if (!field || !field.options) return null;
              for (const preferred of preferences) {
                const exact = field.options.find((option) => normalize(option.name) === normalize(preferred));
                if (exact) return exact;
              }
              for (const preferred of preferences) {
                const partial = field.options.find((option) => normalize(option.name).includes(normalize(preferred)));
                if (partial) return partial;
              }
              return null;
            }

            function projectContainsRepo(project) {
              return project.items.nodes.some((item) => {
                const content = item.content;
                return content && ['Issue', 'PullRequest'].includes(content.__typename) && content.repository?.nameWithOwner === repoFullName;
              });
            }

            function ownerQueryRoot() {
              return projectOwnerType === 'organization' || projectOwnerType === 'org' ? 'organization' : 'user';
            }

            async function getOwnerProjectByNumber(number) {
              const parsedNumber = Number(number);
              if (!Number.isInteger(parsedNumber)) throw new Error(`PROJECT_NUMBER must be an integer, got: ${number}`);

              const root = ownerQueryRoot();
              const data = await github.graphql(`
                query($login: String!, $number: Int!) {
                  ${root}(login: $login) {
                    projectV2(number: $number) { ${projectSelection} }
                  }
                }
              `, { login: projectOwner, number: parsedNumber });

              const project = data[root]?.projectV2;
              if (!project) throw new Error(`Could not find Project #${number} under ${root} ${projectOwner}. Check PROJECT_OWNER, PROJECT_OWNER_TYPE, PROJECT_NUMBER, and token access.`);
              return project;
            }

            async function getOwnerProjects() {
              const root = ownerQueryRoot();
              const data = await github.graphql(`
                query($login: String!) {
                  ${root}(login: $login) {
                    projectsV2(first: 20) { nodes { ${projectSelection} } }
                  }
                }
              `, { login: projectOwner });
              return data[root]?.projectsV2?.nodes || [];
            }

            async function getLinkedProject() {
              if (configuredProjectNumber) return getOwnerProjectByNumber(configuredProjectNumber);

              const projects = await getOwnerProjects();
              if (!projects.length) {
                throw new Error(`No GitHub Projects are visible for ${ownerQueryRoot()} ${projectOwner}. Set PROJECT_NUMBER or check PROJECTS_TOKEN access.`);
              }

              const matchingProject = projects.find(projectContainsRepo);
              if (matchingProject) return matchingProject;

              const projectList = projects.map((project) => `#${project.number} ${project.title}`).join(', ');
              throw new Error(`Found Projects for ${projectOwner}, but none of the first 20 currently contain an item from ${repoFullName}. Set repository variable PROJECT_NUMBER to the intended project. Visible projects: ${projectList}`);
            }

            async function getIssueProjectItem(issueNodeId, projectId) {
              const data = await github.graphql(`
                query($issueId: ID!) {
                  node(id: $issueId) {
                    ... on Issue {
                      projectItems(first: 50) { nodes { id project { id } } }
                    }
                  }
                }
              `, { issueId: issueNodeId });
              return data.node.projectItems.nodes.find((item) => item.project.id === projectId) || null;
            }

            async function ensureIssueInProject(issue, project) {
              const existing = await getIssueProjectItem(issue.node_id, project.id);
              if (existing) return existing;

              try {
                const result = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } }
                  }
                `, { projectId: project.id, contentId: issue.node_id });
                return result.addProjectV2ItemById.item;
              } catch (error) {
                if (!String(error.message || '').includes('already exists')) throw error;
                const item = await getIssueProjectItem(issue.node_id, project.id);
                if (!item) throw error;
                return item;
              }
            }

            async function itemFieldValueNodes(itemId) {
              const fieldSelection = `
                field {
                  __typename
                  ${projectFieldSelection}
                }
              `;
              const data = await github.graphql(`
                query($itemId: ID!) {
                  node(id: $itemId) {
                    ... on ProjectV2Item {
                      fieldValues(first: 100) {
                        nodes {
                          __typename
                          ... on ProjectV2ItemFieldTextValue { text ${fieldSelection} }
                          ... on ProjectV2ItemFieldNumberValue { number ${fieldSelection} }
                          ... on ProjectV2ItemFieldDateValue { date ${fieldSelection} }
                          ... on ProjectV2ItemFieldSingleSelectValue { name ${fieldSelection} }
                          ... on ProjectV2ItemFieldIterationValue { title ${fieldSelection} }
                          ... on ProjectV2ItemFieldLabelValue { labels(first: 1) { totalCount } ${fieldSelection} }
                          ... on ProjectV2ItemFieldMilestoneValue { milestone { title } ${fieldSelection} }
                          ... on ProjectV2ItemFieldRepositoryValue { repository { nameWithOwner } ${fieldSelection} }
                          ... on ProjectV2ItemFieldUserValue { users(first: 1) { totalCount } ${fieldSelection} }
                        }
                      }
                    }
                  }
                }
              `, { itemId });
              return data.node?.fieldValues?.nodes || [];
            }

            function fieldValueHasMeaningfulValue(valueNode) {
              switch (valueNode.__typename) {
                case 'ProjectV2ItemFieldTextValue':
                  return Boolean(String(valueNode.text || '').trim());
                case 'ProjectV2ItemFieldNumberValue':
                  return valueNode.number !== null && valueNode.number !== undefined;
                case 'ProjectV2ItemFieldDateValue':
                  return Boolean(valueNode.date);
                case 'ProjectV2ItemFieldSingleSelectValue':
                  return Boolean(valueNode.name);
                case 'ProjectV2ItemFieldIterationValue':
                  return Boolean(valueNode.title);
                case 'ProjectV2ItemFieldLabelValue':
                  return (valueNode.labels?.totalCount || 0) > 0;
                case 'ProjectV2ItemFieldMilestoneValue':
                  return Boolean(valueNode.milestone?.title);
                case 'ProjectV2ItemFieldRepositoryValue':
                  return Boolean(valueNode.repository?.nameWithOwner);
                case 'ProjectV2ItemFieldUserValue':
                  return (valueNode.users?.totalCount || 0) > 0;
                default:
                  return false;
              }
            }

            async function fieldHasExistingValue(itemId, field) {
              const values = await itemFieldValueNodes(itemId);
              return values.some((valueNode) => valueNode.field?.id === field.id && fieldValueHasMeaningfulValue(valueNode));
            }

            async function updateProjectField(project, itemId, field, value) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value }) {
                    projectV2Item { id }
                  }
                }
              `, { projectId: project.id, itemId, fieldId: field.id, value });
            }

            async function setPriority(project, itemId, issue) {
              const field = findField(project, ['Priority']);
              if (!field) return log.skippedFields.push('Priority field not found');
              if (!field.options) return log.skippedFields.push('Priority field is not single-select');
              if (await fieldHasExistingValue(itemId, field)) return log.fieldsPreserved.push('Priority');

              const priority = priorityForIssue(issue);
              const option = optionByPreference(field, {
                high: ['High', 'P0', 'P1', 'Critical', 'Urgent'],
                medium: ['Medium', 'Normal', 'P2'],
                low: ['Low', 'P3', 'P4', 'Backlog']
              }[priority]);
              if (!option) return log.skippedFields.push(`No Priority option matched ${priority}`);

              await updateProjectField(project, itemId, field, { singleSelectOptionId: option.id });
              log.fieldsUpdated.push(`Priority=${option.name}`);
            }

            async function setSize(project, itemId, estimate) {
              const field = findField(project, ['Size']);
              if (!field) return log.skippedFields.push('Size field not found');
              if (!field.options) return log.skippedFields.push('Size field is not single-select');
              if (await fieldHasExistingValue(itemId, field)) return log.fieldsPreserved.push('Size');

              const size = sizeForEstimate(estimate);
              const option = optionByPreference(field, {
                xs: ['XS', 'Extra small', 'Tiny', '1'],
                s: ['S', 'Small', '2'],
                m: ['M', 'Medium', '3'],
                l: ['L', 'Large', '5'],
                xl: ['XL', 'Extra large', '8', '13']
              }[size]);
              if (!option) return log.skippedFields.push(`No Size option matched ${size}`);

              await updateProjectField(project, itemId, field, { singleSelectOptionId: option.id });
              log.fieldsUpdated.push(`Size=${option.name}`);
            }

            async function setEstimate(project, itemId, estimate) {
              const field = findField(project, ['Estimate', 'Estimation', 'Story points', 'Points']);
              if (!field) return log.skippedFields.push('Estimate field not found');
              if (await fieldHasExistingValue(itemId, field)) return log.fieldsPreserved.push(field.name);

              if (field.dataType === 'NUMBER') {
                await updateProjectField(project, itemId, field, { number: estimate });
                log.fieldsUpdated.push(`Estimate=${estimate}`);
                return;
              }
              if (field.dataType === 'TEXT') {
                await updateProjectField(project, itemId, field, { text: String(estimate) });
                log.fieldsUpdated.push(`Estimate=${estimate}`);
                return;
              }
              if (field.options) {
                const option = optionByPreference(field, [String(estimate), `${estimate} pt`, `${estimate} pts`, `${estimate} points`]);
                if (!option) return log.skippedFields.push(`No Estimate option matched ${estimate}`);
                await updateProjectField(project, itemId, field, { singleSelectOptionId: option.id });
                log.fieldsUpdated.push(`Estimate=${option.name}`);
                return;
              }
              log.skippedFields.push(`Estimate field has unsupported data type: ${field.dataType}`);
            }

            async function getRepoIssues() {
              const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'all', per_page: 100 });
              return issues.filter((issue) => !issue.pull_request && hasTrustedAuthorAssociation(issue));
            }

            async function getProjectItems(project) {
              const items = [];
              let after = null;
              do {
                const data = await github.graphql(`
                  query($projectId: ID!, $after: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $after) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            id
                            content {
                              __typename
                              ... on Issue { id number url repository { nameWithOwner } }
                              ... on PullRequest { id number url repository { nameWithOwner } }
                              ... on DraftIssue { title }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { projectId: project.id, after });

                items.push(...data.node.items.nodes);
                after = data.node.items.pageInfo.hasNextPage ? data.node.items.pageInfo.endCursor : null;
              } while (after);
              return items;
            }

            async function processIssue(issue, existingLabels, project) {
              if (!hasTrustedAuthorAssociation(issue)) {
                log.skippedIssues.push(`#${issue.number}: ${issue.author_association || 'unknown'}`);
                return;
              }

              const labelsToAdd = chooseLabels(issue, existingLabels);
              if (labelsToAdd.length) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: labelsToAdd });
                log.labelsAdded.push(`#${issue.number}: ${labelsToAdd.join(', ')}`);
              }

              const item = await ensureIssueInProject(issue, project);
              const estimate = estimateIssue(issue);
              await setPriority(project, item.id, issue);
              await setSize(project, item.id, estimate);
              await setEstimate(project, item.id, estimate);
              log.processed.push(`#${issue.number}`);
            }

            const existingLabels = await getExistingLabels();
            const project = await getLinkedProject();
            log.project = `${project.title} (#${project.number})`;

            for (const issue of await getRepoIssues()) {
              await processIssue(issue, existingLabels, project);
            }

            for (const item of await getProjectItems(project)) {
              const content = item.content;
              if (!content) continue;
              if (content.__typename === 'Issue' && content.repository.nameWithOwner !== repoFullName) {
                log.projectMismatches.push(`${content.url} belongs to ${content.repository.nameWithOwner}`);
              }
              if (content.__typename === 'DraftIssue') {
                log.projectMismatches.push(`Draft issue "${content.title}" is not tied to ${repoFullName}`);
              }
            }

            await core.summary
              .addHeading('Auto triage summary')
              .addRaw(`Project: ${log.project}\n\n`)
              .addRaw(`Processed issues: ${log.processed.join(', ') || 'none'}\n\n`)
              .addRaw(`Skipped untrusted issues:\n${log.skippedIssues.map((entry) => `- ${entry}`).join('\n') || '- none'}\n\n`)
              .addRaw(`Labels added:\n${log.labelsAdded.map((entry) => `- ${entry}`).join('\n') || '- none'}\n\n`)
              .addRaw(`Project fields updated:\n${log.fieldsUpdated.map((entry) => `- ${entry}`).join('\n') || '- none'}\n\n`)
              .addRaw(`Project fields preserved:\n${log.fieldsPreserved.map((entry) => `- ${entry}`).join('\n') || '- none'}\n\n`)
              .addRaw(`Skipped fields:\n${[...new Set(log.skippedFields)].map((entry) => `- ${entry}`).join('\n') || '- none'}\n\n`)
              .addRaw(`Project mismatches:\n${log.projectMismatches.map((entry) => `- ${entry}`).join('\n') || '- none'}\n`)
              .write();

            if (log.projectMismatches.length) {
              core.setFailed(`Project contains issues or draft issues that are not tied to ${repoFullName}. See workflow summary.`);
            }
        env:
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}
          PROJECT_OWNER_TYPE: ${{ vars.PROJECT_OWNER_TYPE }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
